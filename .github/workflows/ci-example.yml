name: CI | Example

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - ".github/workflows/ci-example.yml"
      - "example/**"
  pull_request:
    branches:
      - "main"
      - "release-*"
    paths:
      - ".github/workflows/example.yml"
      - "example/**"

jobs:
  build:
    name: Build Example
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: example
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: example-${{ runner.os }}-${{ hashFiles('example/**/*.gradle.kts', 'example/gradle.properties', 'example/**/gradle-wrapper.properties') }}
          restore-keys: |
            example-${{ runner.os }}-

      - name: Run Gradle Build
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.configuration-cache=false
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        run: ./gradlew build
