name: CI | Examples

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - ".github/workflows/ci-examples.yml"
      - "examples/**"
  pull_request:
    branches:
      - "main"
      - "release-*"
    paths:
      - ".github/workflows/ci-examples.yml"
      - "examples/**"

jobs:
  build:
    name: Build ${{ matrix.example }}
    strategy:
      fail-fast: false
      matrix:
        example:
          - example-kotlin-interop
          - example-nullmarked-nullaway
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: examples-${{ matrix.example }}-${{ runner.os }}-${{ hashFiles(format('examples/{0}/**/*.gradle.kts', matrix.example), format('examples/{0}/gradle.properties', matrix.example), format('examples/{0}/**/gradle-wrapper.properties', matrix.example)) }}
          restore-keys: |
            examples-${{ matrix.example }}-${{ runner.os }}-

      - name: Run Gradle Build
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.configuration-cache=false
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        run: ./gradlew build
